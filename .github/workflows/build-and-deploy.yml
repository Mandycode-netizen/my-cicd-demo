name: Deploy Blog

# 定义触发方式
on:
  # 1. 支持在 GitHub 界面手动点击触发
  workflow_dispatch:

  # 2. 支持自动触发：仅当推送到 main 分支且提交信息包含 [deploy] 时
  push:
    branches: [main]

jobs:
  deploy: 
    # 条件判断：手动触发 或 (自动触发且提交信息含 [deploy])
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]'))
    runs-on: ubuntu-latest
    steps:
      - name: Run remote script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/
            # 执行你服务器上编写好的一键部署脚本
            bash -l -c './build-and-deploy.sh'